name: Build Research Index

on:
  push:
    paths:
      - '*.md'
      - '!INDEX.md'
      - '!README.md'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-index:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Rename new files and build INDEX.md
        run: |
          python3 << 'PYEOF'
          import os, re
          from collections import defaultdict

          SKIP = {"INDEX.md", "README.md"}
          NOTE_PATTERN = re.compile(r"^note-\d{3}\.md$")

          CATEGORY_ORDER = [
            "Seerah", "Quran", "Namaz", "Duas", "Eschatology",
            "History", "Others", "Fitness", "Strategies", "Personal"
          ]

          def parse_frontmatter(filepath):
            with open(filepath, encoding="utf-8", errors="ignore") as f:
              content = f.read()
            if not content.startswith("---"):
              return None
            match = re.match(r"^---\s*\n(.*?)\n---", content, re.DOTALL)
            if not match:
              return None
            fm = match.group(1)
            title    = re.search(r"^title\s*:\s*(.+)$",    fm, re.MULTILINE)
            category = re.search(r"^category\s*:\s*(.+)$", fm, re.MULTILINE)
            tags     = re.search(r"^tags\s*:\s*\[(.+)\]$", fm, re.MULTILINE)
            if not title or not category:
              return None
            return {
              "title":    title.group(1).strip(),
              "category": category.group(1).strip(),
              "tags":     [t.strip() for t in tags.group(1).split(",")] if tags else [],
            }

          # Step 1: find next available note-XXX number
          existing_ids = set()
          for f in os.listdir("."):
            if NOTE_PATTERN.match(f):
              num = int(f.replace("note-", "").replace(".md", ""))
              existing_ids.add(num)

          def next_id():
            n = 1
            while n in existing_ids:
              n += 1
            existing_ids.add(n)
            return n

          # Step 2: rename any non-note-XXX file that has valid frontmatter
          renamed = []
          for fname in sorted(os.listdir("."), key=str.lower):
            if not fname.endswith(".md"):
              continue
            if fname in SKIP or NOTE_PATTERN.match(fname):
              continue
            if not os.path.isfile(fname):
              continue
            note = parse_frontmatter(fname)
            if note:
              new_name = f"note-{next_id():03d}.md"
              os.rename(fname, new_name)
              print(f"  renamed: {fname} -> {new_name}")
              renamed.append((fname, new_name))

          # Step 3: scan all note-XXX.md files and build index
          buckets = defaultdict(list)
          no_frontmatter = []

          for fname in sorted(os.listdir("."), key=str.lower):
            if not fname.endswith(".md") or fname in SKIP:
              continue
            if not os.path.isfile(fname):
              continue
            note = parse_frontmatter(fname)
            if note:
              note["file"] = fname
              buckets[note["category"]].append(note)
            else:
              no_frontmatter.append(fname)

          for cat in buckets:
            buckets[cat].sort(key=lambda n: n["title"].lower())

          total = sum(len(v) for v in buckets.values())

          # Step 4: write INDEX.md
          lines = []
          lines.append("# Research Notes")
          lines.append("")
          lines.append("> Last updated: __DATE__  ")
          lines.append(f"> {total} notes indexed")
          lines.append("")
          lines.append("---")
          lines.append("")

          ordered = [c for c in CATEGORY_ORDER if c in buckets]
          extras  = sorted(c for c in buckets if c not in CATEGORY_ORDER)

          for cat in ordered + extras:
            notes = buckets[cat]
            lines.append(f"## {cat} ({len(notes)})")
            lines.append("")
            for note in notes:
              tags_str = " · ".join(note["tags"])
              entry = f"- [{note['title']}]({note['file']}) \`{note['category']}\`"
              if tags_str:
                entry += f" · {tags_str}"
              lines.append(entry)
            lines.append("")

          if no_frontmatter:
            lines.append("## Unfiled")
            lines.append("")
            lines.append("> Add frontmatter to categorize these notes.")
            lines.append("")
            for fname in sorted(no_frontmatter):
              lines.append(f"- [{fname}]({fname})")
            lines.append("")

          with open("INDEX.md", "w", encoding="utf-8") as f:
            f.write("\n".join(lines))

          print(f"✅ {total} notes indexed, {len(renamed)} renamed, {len(no_frontmatter)} unfiled")
          PYEOF

      - name: Inject date
        run: |
          sed -i "s/__DATE__/$(date '+%Y-%m-%d %H:%M UTC')/" INDEX.md

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "📚 rename + rebuild index [skip ci]"
          git push